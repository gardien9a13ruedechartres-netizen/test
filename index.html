<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cmtest</title>
  <style>
    :root {
      --plyr-color-main: #00b2ff;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
      overflow-y: hidden;
      background-color: black;
      font-family: Arial, Helvetica, sans-serif;
    }

    #playerWrap {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #streamFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    #dplayer {
      width: 100%;
      height: 100%;
    }

    .plyr--video {
      height: 100%;
    }

    .dplayer-logo {
      pointer-events: none;
      position: absolute;
      right: 10px;
      left: auto;
      top: 10px;
      max-width: 150px;
      max-height: 150px;
    }

    #reloadNotice {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100% - 24px);
      padding: 8px 10px;
      box-sizing: border-box;
      color: #fff;
      background: rgba(0, 0, 0, 0.62);
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.3;
      visibility: hidden;
    }

    #reloadNotice.is-hidden {
      display: none;
    }

    #reloadPageBtn,
    #reloadFrameBtn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 7px 10px;
      color: #001018;
      background: #00b2ff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #reloadFrameBtn {
      color: #fff;
      background: rgba(255, 255, 255, 0.18);
    }

    @media (max-width: 760px) {
      .dplayer-logo {
        max-width: 100px;
        max-height: 100px;
      }

      #reloadNotice {
        right: 8px;
        bottom: 8px;
        left: 8px;
        justify-content: center;
        border-radius: 14px;
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <div id="playerWrap">
    <iframe
      id="streamFrame"
      src="https://dlhd.st/stream/stream-790.php"
      width="100%"
      height="100%"
      frameborder="0"
      allowfullscreen
      loading="lazy"
      sandbox="allow-scripts">
    </iframe>

    <div id="reloadNotice" aria-live="polite">
      <span id="reloadText">Si le flux reste noir, relance la page.</span>
      <button id="reloadPageBtn" type="button">Actualiser la page</button>
      <button id="reloadFrameBtn" type="button">Relancer le cadre</button>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var STREAM_URL = 'https://dlhd.st/stream/stream-790.php';
      var FRAME_LOAD_TIMEOUT_MS = 45000;
      var NOTICE_DELAY_MS = 18000;
      var AUTO_PAGE_RELOAD_DELAY_MS = 55000;
      var MAX_AUTO_PAGE_RELOADS = 1;

      var frame = document.getElementById('streamFrame');
      var notice = document.getElementById('reloadNotice');
      var reloadText = document.getElementById('reloadText');
      var reloadPageBtn = document.getElementById('reloadPageBtn');
      var reloadFrameBtn = document.getElementById('reloadFrameBtn');

      var frameLoaded = false;
      var noticeTimer = null;
      var frameLoadTimer = null;
      var autoPageReloadTimer = null;
      var storageKey = 'stream790AutoReloadCount';

      function getAutoReloadCount() {
        try {
          return Number(sessionStorage.getItem(storageKey) || '0');
        } catch (error) {
          return 0;
        }
      }

      function setAutoReloadCount(value) {
        try {
          sessionStorage.setItem(storageKey, String(value));
        } catch (error) {
          // Session storage may be unavailable in some browsers.
        }
      }

      function showNotice(message) {
        reloadText.textContent = message;
        notice.classList.remove('is-hidden');
      }

      function hideNotice() {
        notice.classList.add('is-hidden');
      }

      function reloadWholePage(reason) {
        var count = getAutoReloadCount();

        if (count >= MAX_AUTO_PAGE_RELOADS) {
          showNotice('Le flux ne répond pas. Clique sur “Actualiser la page” pour relancer comme avant.');
          return;
        }

        setAutoReloadCount(count + 1);
        showNotice(reason || 'Actualisation de la page…');
        window.location.reload();
      }

      function reloadOnlyFrame() {
        showNotice('Relance du cadre…');

        // Ne pas ajouter de paramètre ?reload=..., car certains lecteurs refusent les URLs modifiées.
        frame.src = 'about:blank';
        window.setTimeout(function () {
          frameLoaded = false;
          frame.src = STREAM_URL;
          startWatchers();
        }, 350);
      }

      function clearWatchers() {
        window.clearTimeout(noticeTimer);
        window.clearTimeout(frameLoadTimer);
        window.clearTimeout(autoPageReloadTimer);
      }

      function startWatchers() {
        clearWatchers();

        noticeTimer = window.setTimeout(function () {
          if (!frameLoaded) {
            showNotice('Chargement long. Si le flux reste noir, actualise la page.');
          }
        }, NOTICE_DELAY_MS);

        frameLoadTimer = window.setTimeout(function () {
          if (!frameLoaded) {
            showNotice('Le cadre n’a pas confirmé son chargement. Actualisation possible.');
          }
        }, FRAME_LOAD_TIMEOUT_MS);

        autoPageReloadTimer = window.setTimeout(function () {
          if (!frameLoaded) {
            reloadWholePage('Flux non chargé. Actualisation automatique de la page…');
          }
        }, AUTO_PAGE_RELOAD_DELAY_MS);
      }

      function errorLooksLikeStreamProblem(value) {
        var text = String(value || '').toLowerCase();
        return (
          text.indexOf('hls') !== -1 ||
          text.indexOf('m3u8') !== -1 ||
          text.indexOf('cors') !== -1 ||
          text.indexOf('cross-origin') !== -1 ||
          text.indexOf('access-control-allow-origin') !== -1 ||
          text.indexOf('403') !== -1 ||
          text.indexOf('fatal') !== -1 ||
          text.indexOf('network') !== -1 ||
          text.indexOf('manque de flux') !== -1
        );
      }

      function collectEventText(event) {
        var parts = [];

        if (event) {
          parts.push(event.message);
          parts.push(event.filename);
          parts.push(event.type);

          if (event.reason) {
            parts.push(event.reason.message);
            parts.push(event.reason);
          }

          if (event.target) {
            parts.push(event.target.src);
            parts.push(event.target.href);
            parts.push(event.target.currentSrc);
          }

          if (event.data) {
            try {
              parts.push(JSON.stringify(event.data));
            } catch (error) {
              parts.push(String(event.data));
            }
          }
        }

        return parts.filter(Boolean).join(' ');
      }

      frame.addEventListener('load', function () {
        frameLoaded = true;
        clearWatchers();
        setAutoReloadCount(0);

        window.setTimeout(function () {
          showNotice('Si le flux se coupe, utilise “Actualiser la page”.');
        }, 12000);
      });

      frame.addEventListener('error', function () {
        showNotice('Erreur de chargement du cadre. Essaie “Actualiser la page”.');
      });

      window.addEventListener('error', function (event) {
        var text = collectEventText(event);
        if (errorLooksLikeStreamProblem(text)) {
          showNotice('Erreur de flux détectée. Actualisation de la page recommandée.');
        }
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        var text = collectEventText(event);
        if (errorLooksLikeStreamProblem(text)) {
          showNotice('Erreur HLS détectée. Actualisation de la page recommandée.');
        }
      });

      window.addEventListener('message', function (event) {
        var text = collectEventText(event);
        if (errorLooksLikeStreamProblem(text)) {
          reloadWholePage('Message de flux défaillant reçu. Actualisation automatique de la page…');
        }
      });

      reloadPageBtn.addEventListener('click', function () {
        setAutoReloadCount(0);
        window.location.reload();
      });

      reloadFrameBtn.addEventListener('click', function () {
        reloadOnlyFrame();
      });

      document.addEventListener('visibilitychange', function () {
        if (!document.hidden && !frameLoaded) {
          startWatchers();
        }
      });

      startWatchers();
    }());
  </script>
</body>
</html>
